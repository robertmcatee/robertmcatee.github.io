<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cozy Cats: Kid-Safe & Ad-Free Cat Sort Puzzle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/cat_orange.png">
    <meta name="theme-color" content="#87CEEB">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div id="game-container">
        <!-- Background Layer -->
        <div class="background-layer"></div>
        
        <!-- Game Area -->
        <header>
            <h1>Cozy Cats!</h1>
            <div id="level-display">Level: 1</div>
            <button id="music-btn">🎵 Play Music</button>
        </header>

        <main>
            <div id="houses-container">
                <!-- Houses will be injected here -->
            </div>

            <div id="cats-container">
                <!-- Cats will be injected here -->
            </div>
        </main>

        <div id="win-screen" class="hidden">
            <div class="win-content">
                <h2>Perfect! 🎉</h2>
                <div id="level-complete-msg">Onto the next level!</div>
                <button id="next-level-btn">Next Level</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Registered!', reg.scope))
                    .catch(err => console.log('Service Worker registration failed: ', err));
            });
        }
    </script>
</body>
</html>
